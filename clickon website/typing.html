<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickOn - Typing Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --primary: #3b82f6;
        --primary-hover: #60a5fa;
        --text-main: #ffffff;
        --text-muted: #94a3b8;
        --error: #ef4444;
        --success: #22c55e;
        --radius: 16px;
        --transition: all 0.3s ease;
        --nav-height: 80px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg);
        color: var(--text-main);
        font-family: "Inter", sans-serif;
        line-height: 1.6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      /* --- AUTH LOADING OVERLAY --- */
      #auth-guard {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.4s ease;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(59, 130, 246, 0.3);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* --- NAVIGATION BAR --- */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        height: var(--nav-height);
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(100px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
        border-bottom: 2px solid rgb(255, 255, 255);
      }

      .brand {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text-main);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .brand span {
        color: var(--primary);
      }

      .nav-links {
        display: flex;
        gap: 32px;
        align-items: center;
      }

      .nav-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-weight: 500;
        font-size: 15px;
        transition: var(--transition);
      }

      .nav-links a:hover,
      .nav-links a.active {
        color: var(--text-main);
        border-bottom: 2px solid white;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 10px;
      }

      .user-email {
        font-size: 14px;
        color: var(--text-muted);
        background: var(--card);
        padding: 6px 12px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .btn-logout {
        background: transparent;
        color: var(--text-main);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
      }

      .btn-logout:hover {
        background: rgba(239, 68, 68, 0.1);
        color: var(--error);
        border-color: rgba(239, 68, 68, 0.2);
      }

      /* --- MAIN TYPING INTERFACE --- */
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: calc(var(--nav-height) + 40px) 5% 60px;
      }

      .typing-container {
        width: 100%;
        max-width: 900px;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .stats-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card);
        padding: 20px 30px;
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
      }

      .stat-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .stat-label {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .stat-value {
        font-size: 28px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      .stat-value.timer {
        color: var(--primary);
      }

      .progress-container {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition: width 1s linear;
      }

      .text-box {
        position: relative;
        background: var(--card);
        padding: 40px;
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
        cursor: text;
      }

      /* Hidden input to capture mobile/desktop keystrokes naturally */
      #hidden-input {
        opacity: 0;
        position: absolute;
        z-index: -999;
        top: 0;
        left: 0;
      }

      .typing-text {
        font-family: "JetBrains Mono", monospace;
        font-size: 24px;
        line-height: 1.7;
        color: var(--text-muted);
        word-break: break-word;
        user-select: none;
      }

      .typing-text span {
        position: relative;
        transition: color 0.1s;
      }

      .typing-text span.correct {
        color: var(--text-main);
      }

      .typing-text span.incorrect {
        color: var(--error);
        background: rgba(239, 68, 68, 0.2);
        border-radius: 2px;
      }

      .typing-text span.active {
        color: var(--text-main);
      }

      /* Blinking cursor */
      .typing-text span.active::before {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 2px;
        height: 100%;
        background-color: var(--primary);
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 16px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: var(--transition);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
      }

      .btn-primary:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        transform: translateY(-2px);
      }

      /* --- RESULTS MODAL --- */
      #results-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(8px);
        z-index: 2000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .results-card {
        background: var(--card);
        border-radius: 24px;
        padding: 50px;
        width: 100%;
        max-width: 600px;
        text-align: center;
        border: 1px solid rgba(59, 130, 246, 0.3);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }

      .results-title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      .performance-msg {
        color: var(--primary);
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 40px;
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        margin-bottom: 40px;
      }

      .result-item {
        background: rgba(255, 255, 255, 0.03);
        padding: 24px;
        border-radius: var(--radius);
      }

      .result-item .value {
        font-size: 36px;
        font-weight: 800;
        color: var(--text-main);
      }

      .result-item.highlight .value {
        color: var(--success);
      }

      .result-item.error-box .value {
        color: var(--error);
      }

      @media (max-width: 768px) {
        .nav-links {
          display: none;
        }
        .stats-header {
          flex-wrap: wrap;
          gap: 20px;
          justify-content: center;
        }
        .typing-text {
          font-size: 20px;
        }
        .results-grid {
          grid-template-columns: 1fr;
        }
        .results-card {
          padding: 30px 20px;
        }
      }
    </style>
  </head>
  <body>
    <!-- <div id="auth-guard">
        <div class="spinner"></div>
    </div> -->

    <nav>
      <a href="index.html" class="brand">Click<span>On</span></a>
      <div class="nav-menu" id="nav-menu">
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html" class="active">About Us</a>
          <a href="note.html">Notes</a>
          <a href="flashcards.html">Flashcards</a>
          <a href="flashcards.html">Programming Challenges </a>
          <a href="flashcards.html">Code Editor</a>
          <a href="quiz.html">Quiz</a>
          <a href="faq.html">FAQ</a>
          <a href="contact.html">Contact Us</a>
          <a href="typing.html">WPM Speed</a>
        </div>
        <div class="nav-right">
          <span class="user-email" id="user-email">Loading...</span>
          <!-- <button class="btn btn-primary" id="register-btn">Register</button> -->
          <button class="btn-logout" id="logout-btn">Logout</button>
        </div>
      </div>
    </nav>

    <main>
      <div class="typing-container">
        <div class="stats-header">
          <div class="stat-box">
            <span class="stat-label">Time</span>
            <span class="stat-value timer" id="time-left">120s</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">WPM</span>
            <span class="stat-value" id="wpm-live">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Errors</span>
            <span class="stat-value" id="errors-live">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Accuracy</span>
            <span class="stat-value" id="accuracy-live">100%</span>
          </div>
        </div>

        <div class="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="text-box" id="typing-box">
          <input
            type="text"
            id="hidden-input"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <div class="typing-text" id="typing-text"></div>
        </div>

        <div class="controls">
          <button class="btn btn-primary" id="btn-restart">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
            </svg>
            Restart Test
          </button>
          <button class="btn btn-secondary" id="btn-new-text">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
            New Text
          </button>
        </div>
      </div>
    </main>

    <div id="results-modal">
      <div class="results-card">
        <h2 class="results-title">Test Complete!</h2>
        <div class="performance-msg" id="performance-msg">
          Excellent typing speed!
        </div>

        <div class="results-grid">
          <div class="result-item highlight">
            <div class="stat-label">Net WPM</div>
            <div class="value" id="res-wpm">0</div>
          </div>
          <div class="result-item">
            <div class="stat-label">Accuracy</div>
            <div class="value" id="res-accuracy">0%</div>
          </div>
          <div class="result-item">
            <div class="stat-label">CPM</div>
            <div class="value" id="res-cpm">0</div>
          </div>
          <div class="result-item error-box">
            <div class="stat-label">Total Errors</div>
            <div class="value" id="res-errors">0</div>
          </div>
        </div>

        <button
          class="btn btn-primary"
          id="btn-close-modal"
          style="width: 100%; justify-content: center"
        >
          Try Again
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // ==========================================
      // FIREBASE CONFIGURATION
      // ==========================================
      const firebaseConfig = {
        apiKey: "AIzaSyArDmH7Qbxec6LTqPNj0FFp7kAQAfsfsmg",
        authDomain: "clickon-website.firebaseapp.com",
        projectId: "clickon-website",
        storageBucket: "clickon-website.firebasestorage.app",
        messagingSenderId: "832815696553",
        appId: "1:832815696553:web:c28bdc41070df46949b7b8",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Auth Observer
      onAuthStateChanged(auth, (user) => {
        const authGuard = document.getElementById("auth-guard");
        if (!user) {
          window.location.replace("auth.html");
        } else {
          document.getElementById("user-email").textContent = user.email;
          authGuard.style.opacity = "0";
          setTimeout(() => {
            authGuard.style.display = "none";
          }, 400);
        }
      });

      // Logout
      document
        .getElementById("logout-btn")
        .addEventListener("click", async () => {
          try {
            await signOut(auth);
          } catch (error) {
            alert("Failed to log out.");
          }
        });

      // ==========================================
      // TYPING TEST LOGIC
      // ==========================================
      const paragraphs = [
        "As a self-employed frontend developer and full-stack engineer, mastering modern frameworks like CSS, JavaScript, and Tailwind is essential for building scalable applications.",
        "When preparing for a further mathematics examination, understanding how to solve complex polynomial equations and memorize trigonometric identities can significantly improve your analytical problem-solving speed.",
        "In the rapidly evolving field of cybersecurity, protecting digital assets requires a deep understanding of network vulnerabilities, encryption protocols, and secure authentication methods.",
        "Developing a modern learning platform involves creating interactive modules like flashcards and quizzes, utilizing real-time databases, and ensuring a seamless, distraction-free user experience.",
        "Prompt engineering and the use of AI are rapidly optimizing technical workflows and content creation, allowing developers to generate complex code and high-quality visual assets more efficiently than ever before.",
      ];

      const typingText = document.getElementById("typing-text");
      const hiddenInput = document.getElementById("hidden-input");
      const typingBox = document.getElementById("typing-box");

      const timeDisplay = document.getElementById("time-left");
      const wpmDisplay = document.getElementById("wpm-live");
      const errorsDisplay = document.getElementById("errors-live");
      const accuracyDisplay = document.getElementById("accuracy-live");
      const progressBar = document.getElementById("progress-bar");
      const resultsModal = document.getElementById("results-modal");

      let timer;
      const maxTime = 120;
      let timeLeft = maxTime;
      let charIndex = 0;
      let errors = 0;
      let totalTyped = 0;
      let isTyping = false;

      function loadParagraph() {
        const randomIndex = Math.floor(Math.random() * paragraphs.length);
        typingText.innerHTML = "";
        paragraphs[randomIndex].split("").forEach((char) => {
          let span = `<span>${char}</span>`;
          typingText.innerHTML += span;
        });
        typingText.querySelectorAll("span")[0].classList.add("active");

        // Auto focus on load
        hiddenInput.value = "";
        hiddenInput.focus();
      }

      function initTyping() {
        let characters = typingText.querySelectorAll("span");
        let typedChar = hiddenInput.value.split("")[charIndex];

        if (!isTyping) {
          timer = setInterval(updateTimer, 1000);
          isTyping = true;
        }

        if (charIndex < characters.length && timeLeft > 0) {
          // Backspace handled implicitly by input event shortening value length
          if (hiddenInput.value.length < charIndex) {
            charIndex--;
            if (characters[charIndex].classList.contains("incorrect")) {
              errors--;
            }
            characters[charIndex].classList.remove("correct", "incorrect");
          } else {
            if (characters[charIndex].innerText === typedChar) {
              characters[charIndex].classList.add("correct");
            } else {
              characters[charIndex].classList.add("incorrect");
              errors++;
            }
            charIndex++;
            totalTyped++;
          }

          characters.forEach((span) => span.classList.remove("active"));
          if (charIndex < characters.length) {
            characters[charIndex].classList.add("active");
          } else {
            // Finished paragraph before time
            endTest();
          }

          updateLiveStats();
        }
      }

      function updateTimer() {
        if (timeLeft > 0) {
          timeLeft--;
          timeDisplay.innerText = `${timeLeft}s`;
          progressBar.style.width = `${((maxTime - timeLeft) / maxTime) * 100}%`;
          updateLiveStats();
        } else {
          endTest();
        }
      }

      function updateLiveStats() {
        let timeElapsed = maxTime - timeLeft;
        if (timeElapsed === 0) return;

        let cpm = Math.round((charIndex / timeElapsed) * 60);
        let wpm = Math.round((charIndex / 5 / timeElapsed) * 60);
        let accuracy =
          totalTyped > 0
            ? Math.round(((totalTyped - errors) / totalTyped) * 100)
            : 100;

        wpmDisplay.innerText = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;
        errorsDisplay.innerText = errors;
        accuracyDisplay.innerText = `${accuracy}%`;
      }

      function endTest() {
        clearInterval(timer);
        hiddenInput.disabled = true;

        let timeElapsed = maxTime - timeLeft || 1;
        let grossWpm = Math.round((charIndex / 5 / timeElapsed) * 60);
        let netWpm = Math.round(grossWpm - errors / (timeElapsed / 60));
        netWpm = netWpm < 0 ? 0 : netWpm;

        let cpm = Math.round((charIndex / timeElapsed) * 60);
        let accuracy =
          totalTyped > 0
            ? Math.round(((totalTyped - errors) / totalTyped) * 100)
            : 100;

        document.getElementById("res-wpm").innerText = netWpm;
        document.getElementById("res-cpm").innerText = cpm;
        document.getElementById("res-errors").innerText = errors;
        document.getElementById("res-accuracy").innerText = `${accuracy}%`;

        let msg = "Keep practicing!";
        if (netWpm > 80) msg = "Excellent typing speed! You're a pro.";
        else if (netWpm > 50) msg = "Great job! Very solid performance.";
        else if (netWpm > 30) msg = "Good effort! You are getting there.";

        document.getElementById("performance-msg").innerText = msg;
        resultsModal.style.display = "flex";
      }

      function resetTest() {
        loadParagraph();
        clearInterval(timer);
        timeLeft = maxTime;
        charIndex = errors = totalTyped = 0;
        isTyping = false;

        hiddenInput.disabled = false;
        hiddenInput.value = "";
        timeDisplay.innerText = `${timeLeft}s`;
        wpmDisplay.innerText = 0;
        errorsDisplay.innerText = 0;
        accuracyDisplay.innerText = "100%";
        progressBar.style.width = "0%";
        resultsModal.style.display = "none";
        hiddenInput.focus();
      }

      // Event Listeners
      typingBox.addEventListener("click", () => hiddenInput.focus());
      hiddenInput.addEventListener("input", initTyping);
      document
        .getElementById("btn-restart")
        .addEventListener("click", resetTest);
      document
        .getElementById("btn-new-text")
        .addEventListener("click", resetTest);
      document
        .getElementById("btn-close-modal")
        .addEventListener("click", resetTest);

      // Initialize
      loadParagraph();
    </script>
  </body>
</html>
